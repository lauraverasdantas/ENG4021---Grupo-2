<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD flow - Inicializando</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        /* ===== Variáveis de tema (claro / escuro) ===== */
        :root {
            --bg-grad-1: #C2DCF2;
            --bg-grad-2: #9ECAE8;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(42, 90, 140, 0.15);
            --title-color: #264A6E;
            --subtitle-color: #5798D6;
            --face-color: #264A6E;
            --link-color: #264A6E;
        }
        [data-theme="dark"] {
            --bg-grad-1: #1a2738;
            --bg-grad-2: #0e1622;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --title-color: #EAF4FF;
            --subtitle-color: #8EBFED;
            --face-color: #EAF4FF;
            --link-color: #C2DCF2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        /* ===== Botão de alternância de tema ===== */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--title-color);
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease, transform 0.2s ease;
        }
        .theme-toggle:hover { transform: scale(1.1); }

        .splash-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.2s ease-out forwards;
        }

        .glass-box {
            width: 180px;
            height: 180px;
            border-radius: 35px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--glass-shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            transition: background 0.4s ease, border 0.4s ease, box-shadow 0.4s ease;
        }

        .shadow {
            position: absolute;
            bottom: 25px;
            width: 70px;
            height: 12px;
            background: var(--glass-shadow);
            border-radius: 50%;
            filter: blur(4px);
            animation: shadowScale 3.5s ease-in-out infinite;
        }

        .sphere-3d {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            background: radial-gradient(circle at 30% 25%, #EAF4FF 0%, #8EBFED 40%, #5798D6 80%, #326DA6 100%);
            box-shadow: inset -8px -8px 20px rgba(0, 0, 0, 0.15);
            animation: float 3.5s ease-in-out infinite;
        }

        .eye {
            position: absolute;
            width: 8px;
            height: 14px;
            background-color: var(--face-color);
            border-radius: 10px;
            top: 45px;
            animation: blink 4s infinite;
        }
        .eye.left { left: 32px; }
        .eye.right { right: 32px; }

        .smile {
            position: absolute;
            width: 18px;
            height: 8px;
            border-bottom: 2.5px solid var(--face-color);
            border-radius: 0 0 20px 20px;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
        }

        .loader-ring {
            position: absolute;
            bottom: -20px;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #326DA6;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .text-container { text-align: center; }

        .brand-title {
            font-size: 4rem;
            color: var(--title-color);
            line-height: 1;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: color 0.4s ease;
        }
        .brand-mood { font-weight: 800; }
        .brand-flow { font-weight: 300; opacity: 0.8; letter-spacing: 0; }

        .brand-subtitle {
            margin-top: 5px;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--subtitle-color);
            text-transform: lowercase;
            letter-spacing: 2px;
            transition: color 0.4s ease;
        }

        ul { list-style: none; margin-top: 25px; text-align: center; }
        ul li { margin: 6px 0; }
        ul li a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.4s ease, opacity 0.2s ease;
        }
        ul li a:hover { opacity: 0.6; }

        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes shadowScale { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(0.8); opacity: 0.1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 94%, 98%, 100% { height: 14px; top: 45px; } 96% { height: 2px; top: 51px; } }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema" title="Alternar tema claro/escuro">🌙</button>

    <div class="splash-wrapper">
        <div class="glass-box">
            <div class="shadow"></div>
            <div class="sphere-3d">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="smile"></div>
            </div>
        </div>

        <div class="text-container">
            <h1 class="brand-title">
                <span class="brand-mood">MOOD</span>
                <span class="brand-flow">flow</span>
            </h1>
            <p class="brand-subtitle">controle o agora</p>
        </div>
        <ul>
            <li><a href="#">Login</a></li>
            <li><a href="#">Registro</a></li>
            <li><a href="#">Editar Perfil</a></li>
            <li><a href="#">Listar Usuários</a></li>
            <li><a href="#">Remover Usuário</a></li>
            <li><a href="#">Humor</a></li>
            <li><a href="#">Calendário</a></li>
        </ul>
    </div>

    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const atual = document.documentElement.getAttribute('data-theme');
            applyTheme(atual === 'dark' ? 'light' : 'dark');
        }
        // começa no claro (poderia respeitar a preferência do sistema)
        applyTheme('light');
    </script>
</body>
</html>
