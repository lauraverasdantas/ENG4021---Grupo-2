
<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário - MOOD flow</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
/* --- Estilos Globais e Fundo Quadriculado --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #BBD7F3;
    background-image: 
        repeating-linear-gradient(rgba(255, 255, 255, 0.3) 0px, rgba(255, 255, 255, 0.3) 1px, transparent 1px, transparent 20px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.3) 0px, rgba(255, 255, 255, 0.3) 1px, transparent 1px, transparent 20px);
    font-family: 'Patrick Hand', cursive;
    padding: 40px 20px;
}

/* --- Cabeçalho (Nuvem e Seletor) --- */
.header-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-bottom: 40px;
    z-index: 10;
}

/* Título em formato de nuvem */
.cloud-title {
    background-color: #FDFDFD;
    padding: 15px 50px;
    border-radius: 50px;
    font-family: 'Caveat', cursive;
    font-size: 3.5rem;
    color: #6BA3CE;
    position: relative;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
}

.cloud-title::before, .cloud-title::after {
    content: '';
    position: absolute;
    background-color: #FDFDFD;
    border-radius: 50%;
    z-index: -1;
}

.cloud-title::before {
    width: 70px; height: 70px;
    top: -20px; left: 40px;
}

.cloud-title::after {
    width: 90px; height: 90px;
    top: -30px; right: 40px;
}

/* Seletor de Mês */
.month-selector {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.5rem;
    padding: 8px 20px;
    border-radius: 20px;
    border: 2px solid #6BA3CE;
    background-color: white;
    color: #6BA3CE;
    outline: none;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    transition: all 0.2s;
}

.month-selector:hover {
    background-color: #f0f6fa;
}

/* --- Grid do Calendário --- */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 20px;
    max-width: 900px;
    width: 100%;
    justify-items: center;
}

/* --- Design do Cartão do Dia --- */
.day-card {
    width: 75px;
    height: 85px;
    display: flex;
    flex-direction: column;
    border-radius: 8px;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    background-color: white;
}

.day-card:hover {
    transform: translateY(-5px);
    box-shadow: 4px 8px 15px rgba(0,0,0,0.12);
}

/* Parte Azul Superior (com os furos da espiral) */
.day-top {
    height: 35%;
    background-color: #72A5D3;
    border-radius: 8px 8px 0 0;
    color: white;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    padding: 2px 6px;
    font-size: 1rem;
    position: relative;
}

.day-top::before {
    content: '';
    position: absolute;
    top: -3px;
    left: 5px;
    right: 5px;
    height: 10px;
    background-image: radial-gradient(circle, white 3.5px, transparent 4px);
    background-size: 15px 10px;
    background-position: center;
}

/* Parte Branca Inferior */
.day-bottom {
    height: 65%;
    background-color: #F2F4F5;
    border-radius: 0 0 8px 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    color: #C0C0C0;
    transition: all 0.3s;
}

/* --- Estado de Dia Selecionado --- */
.day-card.selected .day-bottom {
    background-color: #D4E6F1;
    color: #6BA3CE;
}

/* --- Responsividade --- */
@media (max-width: 700px) {
    .calendar-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
    }
    .cloud-title { font-size: 2.8rem; padding: 15px 30px; }
    .cloud-title::before, .cloud-title::after { display: none; }
    .cloud-title { border-radius: 20px; }
}

@media (max-width: 500px) {
    .calendar-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}
</style>

<style>
/* ===== Toggle de tema (Sprint 6) ===== */
.theme-toggle{position:fixed;top:18px;right:18px;z-index:9999;width:46px;height:46px;
border-radius:50%;border:1px solid rgba(120,120,120,.35);background:rgba(255,255,255,.6);
backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-size:1.3rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;transition:transform .2s ease;}
.theme-toggle:hover{transform:scale(1.1);}
/* Modo escuro: inverte a pagina e gira o matiz de volta (mantem azuis azuis) */
html[data-theme="dark"]{filter:invert(1) hue-rotate(180deg);background:#0e1622;}
html[data-theme="dark"] .theme-toggle{filter:invert(1) hue-rotate(180deg);}
html{transition:filter .35s ease;}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema claro/escuro" aria-label="Alternar tema">🌙</button>

    <div class="header-container">
        <div class="cloud-title">calendário</div>
        
        <select id="month-selector" class="month-selector">
            <option value="31">Janeiro</option>
            <option value="28">Fevereiro</option>
            <option value="31">Março</option>
            <option value="30">Abril</option>
            <option value="31">Maio</option>
            <option value="30">Junho</option>
            <option value="31">Julho</option>
            <option value="31">Agosto</option>
            <option value="30">Setembro</option>
            <option value="31">Outubro</option>
            <option value="30">Novembro</option>
            <option value="31">Dezembro</option>
        </select>
    </div>

    <div class="calendar-grid" id="calendar-grid">
        </div>

    <script>
        const monthSelector = document.getElementById('month-selector');
        const calendarGrid = document.getElementById('calendar-grid');

        function renderCalendar(days) {
            calendarGrid.innerHTML = ''; 
            
            for (let i = 1; i <= days; i++) {
                const dayNumber = i < 10 ? '0' + i : i;
                
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                dayCard.innerHTML = `
                    <div class="day-top">${dayNumber}</div>
                    <div class="day-bottom" id="icon-${i}">+</div>
                `;

                dayCard.addEventListener('click', function() {
                    this.classList.toggle('selected');
                    const icon = document.getElementById(`icon-${i}`);
                    
                    if (this.classList.contains('selected')) {
                        icon.innerHTML = '✓';
                    } else {
                        icon.innerHTML = '+';
                    }
                });

                calendarGrid.appendChild(dayCard);
            }
        }

        // Renderiza Janeiro ao carregar a página
        renderCalendar(31);

        // Atualiza ao mudar o mês
        monthSelector.addEventListener('change', function() {
            const daysInMonth = parseInt(this.value);
            renderCalendar(daysInMonth);
        });
    </script>


<script>
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);
document.querySelector('.theme-toggle').textContent = t==='dark'?'☀️':'🌙';}
function toggleTheme(){var a=document.documentElement.getAttribute('data-theme');
applyTheme(a==='dark'?'light':'dark');}
applyTheme('light');
</script>

</body>
</html>
