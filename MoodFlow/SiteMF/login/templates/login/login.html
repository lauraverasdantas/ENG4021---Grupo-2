{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD Flow - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Lilita+One&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <style>
        /* --- Estilos Globais e Fundo --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #B3D4EC;
            background-image: 
                repeating-linear-gradient(rgba(255, 255, 255, 0.2) 0px, rgba(255, 255, 255, 0.2) 1px, transparent 1px, transparent 20px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.2) 0px, rgba(255, 255, 255, 0.2) 1px, transparent 1px, transparent 20px);
            font-family: 'Patrick Hand', cursive;
            padding: 20px;
        }

        /* --- Contentor Principal --- */
        .main-container {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            border: 4px solid white;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
            gap: 30px;
        }

        /* --- Painel Esquerdo --- */
        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            color: white;
            max-width: 450px;
        }

        .brand-text { font-size: 5.5rem; line-height: 1; }
        .mood-part { font-family: 'Lilita One', cursive; text-shadow: 2px 2px 0px rgba(0,0,0,0.05); }
        .flow-part { font-family: 'Caveat', cursive; }

        .faces-container {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .face {
            width: 40px;
            height: 40px;
            border: 2px solid white;
            border-radius: 50%;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .face:hover { transform: scale(1.15) rotate(5deg); }

        .face .left-eye, .face .right-eye {
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 14px;
        }

        .face .left-eye { left: 12px; }
        .face .right-eye { right: 12px; }

        .face .mouth {
            width: 16px;
            height: 8px;
            border: 2px solid white;
            position: absolute;
            bottom: 8px;
            left: 10px;
        }

        .face.happy .mouth { border-top: none; border-radius: 0 0 100px 100px; }
        .face.neutral .mouth { height: 2px; bottom: 12px; }
        .face.frowning .mouth { border-bottom: none; border-radius: 100px 100px 0 0; }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
        }

        /* --- Painel Direito: O Dispositivo --- */
        .device-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-color: white;
            width: 100%;
            max-width: 320px;
            height: 600px;
            border-radius: 40px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.1), inset 0 0 12px rgba(0,0,0,0.03); 
            padding: 35px 30px;
        }

        .avatar-ring {
            width: 130px;
            height: 130px;
            background-color: #E6E6E6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .avatar {
            width: 95px;
            height: 95px;
            background-color: #A08CD2;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s ease;
        }

        .device-frame:hover .avatar { transform: scale(1.05); }

        .avatar .face { border: none; }
        .avatar .face .left-eye, .avatar .face .right-eye, .avatar .face .mouth {
            background-color: #4A4A4A;
            border-color: #4A4A4A;
        }
        .avatar .face .mouth { border-top: none; border-radius: 0 0 100px 100px; }

        /* --- Formulário de Login --- */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px; 
        }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid transparent;
            background-color: #F6F6F6;
            border-radius: 12px;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
            color: #4A4A4A;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #A08CD2;
            background-color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(160, 140, 210, 0.1);
        }

        .input-field::placeholder { color: #A6A6A6; font-family: 'Patrick Hand', cursive; }

        /* --- Links: Esqueci Senha & Criar Conta --- */
        .forgot-password {
            font-family: sans-serif;
            font-size: 0.8rem;
            color: #888;
            text-align: right;
            text-decoration: none;
            margin-top: -5px;
            transition: color 0.2s;
        }

        .forgot-password:hover { color: #A08CD2; text-decoration: underline; }

        .signup-link {
            font-family: sans-serif;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
        }

        .signup-link a { color: #A08CD2; text-decoration: none; font-weight: bold; transition: color 0.2s; }
        .signup-link a:hover { color: #8b76c4; text-decoration: underline; }

        /* --- Botão Enviar --- */
        .submit-button {
            margin-top: 5px;
            width: 100%;
            padding: 10px;
            border: none;
            background-color: #B3D4EC;
            color: white;
            border-radius: 99px;
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .submit-button:hover { 
            background-color: #A08CD2; 
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(160, 140, 210, 0.3);
        }

        .submit-button:active { transform: translateY(0); }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 850px) {
            .main-container {
                flex-direction: column;
                border: none;
                background: transparent;
                padding: 0;
                margin-top: 20px;
                margin-bottom: 20px;
            }
            .left-panel { align-items: center; text-align: center; }
            .brand-text { font-size: 4.5rem; }
            .subtitle { font-size: 3rem; }
            .device-frame { max-width: 100%; height: auto; padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <div class="left-panel">
            <div class="brand-text">
                <span class="mood-part">MOOD</span> <span class="flow-part">flow</span>
            </div>
            
            <div class="faces-container">
                <div class="face happy" role="img" aria-label="Rosto Feliz">
                    <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                </div>
                <div class="face neutral" role="img" aria-label="Rosto Neutro">
                    <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                </div>
                <div class="face frowning" role="img" aria-label="Rosto Triste">
                    <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                </div>
            </div>
            
            <p class="subtitle">controle o agora</p>
        </div>

        <div class="device-frame">
            <div class="avatar-ring">
                <div class="avatar">
                    <div class="face" role="img" aria-label="Avatar de Perfil">
                        <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                    </div>
                </div>
            </div>
            
            <form class="login-form" action="#" method="POST">
                {% csrf_token %}
                <input type="text" placeholder="usuário" class="input-field" required>
                <input type="password" placeholder="senha" class="input-field" required>
                
                <a href="#" class="forgot-password">Esqueci minha senha</a>
                <a href="{% url 'calendario:calendario' %}" class="submit-button">Login</a>
                <div class="signup-link">
                    Não tem conta? <a href="{% url 'registro:registro' %}">Crie uma aqui</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
