{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD flow - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Lilita+One&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
</head>
<body>
    <div class="main-container">
        <div class="left-panel">
            <div class="brand-text">
                <span class="mood-part">MOOD</span> <span class="flow-part">flow</span>
            </div>

            <div class="faces-container">
                <div class="face happy" role="img" aria-label="Rosto Feliz">
                    <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                </div>
                <div class="face neutral" role="img" aria-label="Rosto Neutro">
                    <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                </div>
                <div class="face frowning" role="img" aria-label="Rosto Triste">
                    <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                </div>
            </div>

            <p class="subtitle">controle o agora</p>
        </div>

        <div class="device-frame">
            <div class="avatar-ring">
                <div class="avatar">
                    <div class="face" role="img" aria-label="Avatar de Perfil">
                        <span class="left-eye"></span><span class="right-eye"></span><span class="mouth"></span>
                    </div>
                </div>
            </div>

            <form class="login-form" action="{% url 'login:login' %}" method="POST">
                {% csrf_token %}
                <input type="text" name="usuario" placeholder="usuario" class="input-field" required>
                <input type="password" name="senha" placeholder="senha" class="input-field" required>

                <a href="#" class="forgot-password">Esqueci minha senha</a>

                <button type="submit" class="submit-button">Login</button>

                <div class="signup-link">
                    Nao tem conta? <a href="{% url 'registro:registro' %}">Crie uma aqui</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
