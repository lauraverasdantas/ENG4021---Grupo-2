{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MOOD Flow</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'registro/css/registro.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <div class="register-container">
        <div class="register-header">
            <h2>Crie sua conta</h2>
            <p>Junte-se ao MOOD flow</p>
        </div>

        <form class="register-form" action="{% url 'registro' %}" method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva" required>
            </div>

            <div class="input-group">
                <label for="data_nasc">Data de Nascimento</label>
                <input type="date" id="data_nasc" name="data_nasc" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="maria@exemplo.com" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" maxlength="15" pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}" inputmode="numeric" required>
            </div>

            <div class="input-group">
                <label for="usuario">Nome de Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="mariasilva123" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
            </div>

            <button type="submit" class="submit-button">Cadastrar</button>
            
            <div class="login-link">
                Já tem uma conta? <a href="{% url 'login' %}">Faça login aqui</a>
            </div>
        </form>
    </div>

<footer style="margin-top: auto; width: 100%; text-align:center; padding:20px; background:rgba(255,255,255,0.25);">    <a href="https://instagram.com/moodflowsite" target="_blank" style="color:white; font-size:1.8rem; margin:0 10px; text-decoration:none;">
        <i class="fa-brands fa-instagram"></i>
    </a>
    <p style="color:white; font-family:'Patrick Hand',cursive; margin-top:8px; font-size:0.9rem;">
        &copy; 2026 MoodFlow. Todos os direitos reservados.
    </p>
</footer>
<script>
    const telefoneInput = document.getElementById('telefone');

    telefoneInput.addEventListener('input', function () {
        let numeros = telefoneInput.value.replace(/\D/g, '').slice(0, 11);

        if (numeros.length > 6) {
            telefoneInput.value = `(${numeros.slice(0, 2)}) ${numeros.slice(2, 7)}-${numeros.slice(7)}`;
        } else if (numeros.length > 2) {
            telefoneInput.value = `(${numeros.slice(0, 2)}) ${numeros.slice(2)}`;
        } else if (numeros.length > 0) {
            telefoneInput.value = `(${numeros}`;
        } else {
            telefoneInput.value = '';
        }
    });
</script>
</body>
</html>
