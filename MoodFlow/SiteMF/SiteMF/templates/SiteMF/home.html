{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD flow - Inicializando</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Estilos Globais --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fundo azul sereno */
            background: linear-gradient(135deg, #C2DCF2 0%, #9ECAE8 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- Container Principal --- */
        .splash-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Animação suave ao abrir a página */
            animation: fadeIn 1.2s ease-out forwards;
        }

        /* --- Caixa de Vidro (Fundo do Avatar) --- */
        .glass-box {
            width: 180px;
            height: 180px;
            border-radius: 35px;
            /* Efeito de Vidro Fosco */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(42, 90, 140, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        /* --- Sombra Dinâmica no Chão --- */
        .shadow {
            position: absolute;
            bottom: 25px;
            width: 70px;
            height: 12px;
            background: rgba(42, 90, 140, 0.2);
            border-radius: 50%;
            filter: blur(4px);
            animation: shadowScale 3.5s ease-in-out infinite;
        }

        /* --- Esfera 3D --- */
        .sphere-3d {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            /* Iluminação e Volume 3D aprimorados */
            background: radial-gradient(circle at 30% 25%, #EAF4FF 0%, #8EBFED 40%, #5798D6 80%, #326DA6 100%);
            box-shadow: inset -8px -8px 20px rgba(0, 0, 0, 0.15);
            /* Flutuação contínua */
            animation: float 3.5s ease-in-out infinite;
        }

        /* --- Detalhes do Rosto --- */
        .eye {
            position: absolute;
            width: 8px;
            height: 14px;
            background-color: #264A6E;
            border-radius: 10px;
            top: 45px;
            /* Animação de piscar os olhos */
            animation: blink 4s infinite;
        }
        .eye.left { left: 32px; }
        .eye.right { right: 32px; }

        .smile {
            position: absolute;
            width: 18px;
            height: 8px;
            border-bottom: 2.5px solid #264A6E;
            border-radius: 0 0 20px 20px;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- Anel de Carregamento Fino e Elegante --- */
        .loader-ring {
            position: absolute;
            bottom: -20px;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #326DA6;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        /* --- Tipografia Fiel --- */
        .text-container {
            text-align: center;
        }

        .brand-title {
            font-size: 4rem;
            color: #264A6E;
            line-height: 1;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .brand-mood { font-weight: 800; }
        .brand-flow { font-weight: 300; opacity: 0.8; letter-spacing: 0; }

        .brand-subtitle {
            margin-top: 5px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #5798D6;
            text-transform: lowercase;
            letter-spacing: 2px;
        }

        /* --- Keyframes das Animações --- */
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes shadowScale {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(0.8); opacity: 0.1; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes blink {
            0%, 94%, 98%, 100% { height: 14px; top: 45px; }
            96% { height: 2px; top: 51px; } /* Momento que o olho fecha */
        }
    </style>
</head>
<body>

    <div class="splash-wrapper">
        
        <div class="glass-box">
            <div class="shadow"></div>
            
            <div class="sphere-3d">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="smile"></div>
            </div>
        </div>

        <div class="text-container">
            <h1 class="brand-title">
                <span class="brand-mood">MOOD</span>
                <span class="brand-flow">flow</span>
            </h1>
            <p class="brand-subtitle">controle o agora</p>
        </div>
         <ul>
            <li><a href="{% url 'login:login' %}">Login</a></li>
            <li><a href="{% url 'registro:registro' %}">Registro</a></li>
            <li><a href="{% url 'editarperfil:editar_perfil' %}">Editar Perfil</a></li>
            <li><a href="{% url 'listarusuario:listarusuario' %}">Listar Usuários</a></li>
            <li><a href="{% url 'removerusuario:removerusuario' %}">Remover Usuário</a></li>
            <li><a href="{% url 'humor:humor' %}">Humor</a></li>
            <li><a href="{% url 'calendario:calendario' %}">Calendário</a></li>
            </ul>
    </div>

</body>
</html>
