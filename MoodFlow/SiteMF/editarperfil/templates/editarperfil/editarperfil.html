{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - MOOD flow</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'editarperfil/css/editarperfil.css' %}">
</head>
<body>

    <div class="profile-container">
        <div class="profile-header">
            <h2>Editar Perfil</h2>
            <p>Atualize suas informações de contato e segurança</p>
        </div>

        <form class="profile-form" action="#" method="POST">
            
            <div class="input-group locked">
                <label for="nome">Nome Completo (Não editável)</label>
                <input type="text" id="nome" name="nome" value="Maria Silva" readonly>
            </div>

            <div class="input-group locked">
                <label for="usuario">Nome de Usuário (Não editável)</label>
                <input type="text" id="usuario" name="usuario" value="@mariasilva123" readonly>
            </div>

            <hr class="divider">

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" value="maria@exemplo.com" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" value="(11) 99999-9999" required>
            </div>

            <div class="input-group">
                <label for="senha">Nova Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite apenas se quiser alterar">
            </div>

            <div class="actions">
                <a href="{% url 'login:login' %}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-save">Salvar Alterações</button>
            </div>
        </form>
    </div>
<!-- Footer com redes sociais -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<footer style="width:100%; text-align:center; padding:20px; background:rgba(255,255,255,0.25); border-top:2px solid rgba(255,255,255,0.5); margin-top:30px;">
    <a href="https://instagram.com/moodflowsite" target="_blank" style="color:white; font-size:1.8rem; margin:0 10px; text-decoration:none;">
        <i class="fa-brands fa-instagram"></i>
    </a>
    <p style="color:white; font-family:'Patrick Hand',cursive; margin-top:8px; font-size:0.9rem;">
        &copy; 2025 MoodFlow. Todos os direitos reservados.
    </p>
</footer>
</body>
</html>
